name: iOS Build (Unsigned)

on:
  push:
    branches: [ main, master, ios-build ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.27.3"

      - name: Flutter Pub Get & Generate
        run: |
          flutter pub get
          dart run intl_utils:generate

      - name: Install CocoaPods
        run: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS (no codesign)
        env:
          COCOAPODS_DISABLE_STATS: "true"
        run: |
          flutter build ios --release --no-codesign

      - name: Archive .app
        if: success()
        run: |
          mkdir -p build_artifacts
          APP_DIR="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_DIR" ]; then
            (cd build/ios/iphoneos && zip -r ../../build_artifacts/Runner.app.zip Runner.app)
          else
            echo "Runner.app not found; listing build dir" && ls -R build/ios || true
          fi

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-Runner-app
          path: build_artifacts/Runner.app.zip